<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lava Rapido - Login</title>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body class="login-body">
    <div class="login-card">
        <h2>Acesso ao Sistema</h2>
        
        {% if erro %}
            <div style="background-color: #f44336; color: white; padding: 10px; border-radius: 6px; margin-bottom: 1rem;">
                {{ erro }}
            </div>
        {% endif %}
        
        <form method="POST">
            <div class="form-group">
                <label>Usuario</label>
                <input type="text" name="usuario" placeholder="Digite seu usuario" required>
            </div>
            <div class="form-group">
                <label>Senha</label>
                <input type="password" name="senha" placeholder="Digite sua senha" required>
            </div>
            <button type="submit" class="btn btn-primary">Entrar</button>
        </form>
        
        <p style="margin-top: 1.5rem; color: #888; font-size: 0.85rem;">
            Sistema de Gerenciamento de Lava Jato v3.0
        </p>
    </div>
</body>
</html>
